name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libsqlite3-dev

      - name: Tidy and download dependencies
        run: go mod tidy

      - name: Verify build
        env:
          CGO_ENABLED: 1
        run: go build ./...

      - name: Run vet
        env:
          CGO_ENABLED: 1
        run: go vet ./...
